name: release-to-maven-central
on:
  workflow_dispatch:
    inputs:
      releaseversion:
        description: 'Release version (e.g. 2.0.8)'
        required: true
        default: ''
      nextSnapshotVersion:
        description: 'Next snapshot version (e.g. 2.0.9-SNAPSHOT)'
        required: true
        default: ''
      skipDeploy:
        description: 'Skip the Maven Central deploy step (for retrying after a successful deploy whose post-deploy steps failed)'
        type: boolean
        default: false
jobs:
  publish:
    runs-on: ubuntu-latest
    # Required so the workflow can push the release commit + tag and the
    # subsequent next-snapshot bump back to main.
    permissions:
      contents: write
    steps:
      - run: echo "Will release ${{ github.event.inputs.releaseversion }} and then bump main to ${{ github.event.inputs.nextSnapshotVersion }} (skipDeploy=${{ github.event.inputs.skipDeploy }})"

      - uses: actions/checkout@v4
        with:
          # Fetch full history so tags and pushes aren't blocked by a shallow clone.
          fetch-depth: 0
          # Use the default GITHUB_TOKEN for subsequent git operations.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Guard — must be dispatched from main
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "This workflow must be run from the 'main' branch (got: ${{ github.ref }})." >&2
            echo "Re-dispatch with 'Use workflow from' set to Branch: main." >&2
            exit 1
          fi

      - name: Set up Maven Central Repository
        uses: actions/setup-java@v4
        with:
          java-version: 11
          distribution: 'temurin'
          server-id: s01.oss.sonatype.org
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      # Fail fast with a useful diagnosis before we burn 30s pulling Maven
      # dependencies only to die at the sign-artifacts step. Covers the
      # three ways the GPG setup can be wrong:
      #   - MAVEN_GPG_PRIVATE_KEY is a public key, malformed, or missing
      #   - the imported key is expired or revoked
      #   - MAVEN_GPG_PASSPHRASE doesn't match the imported key
      # Only metadata is logged (key IDs, UIDs, expiry) — never key material.
      - name: Diagnose — GPG keyring state
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          echo "::group::GPG version"
          gpg --version | head -2
          echo "::endgroup::"

          echo "::group::Imported secret keys"
          gpg --list-secret-keys --keyid-format LONG || true
          echo "::endgroup::"

          SECRET_COUNT=$(gpg --list-secret-keys --with-colons 2>/dev/null | grep -c '^sec:' || true)
          if [ "$SECRET_COUNT" = "0" ]; then
            echo "::error::No secret keys in the keyring after setup-java import."
            echo "Most likely causes:"
            echo "  - MAVEN_GPG_PRIVATE_KEY contains a PUBLIC key, not a private key."
            echo "    Re-export with 'gpg --armor --export-secret-keys <KEYID>' and"
            echo "    confirm the first line is '-----BEGIN PGP PRIVATE KEY BLOCK-----'."
            echo "  - The secret was truncated or CRLF-mangled when pasted into the GitHub UI."
            exit 1
          fi

          # Flag expiry / revocation up front rather than waiting for mvn gpg-sign
          # to reject the key with a less obvious error.
          if gpg --list-secret-keys --with-colons | awk -F: '$1=="sec" && $2=="e"' | grep -q .; then
            echo "::error::Imported GPG key is EXPIRED. Extend the key locally with"
            echo "  'gpg --edit-key <KEYID>' → 'expire' → new date → 'save'"
            echo "then re-export and update the MAVEN_GPG_PRIVATE_KEY secret and the keyserver."
            exit 1
          fi
          if gpg --list-secret-keys --with-colons | awk -F: '$1=="sec" && $2=="r"' | grep -q .; then
            echo "::error::Imported GPG key is REVOKED. Generate a new keypair."
            exit 1
          fi

          echo "::group::Signing smoke test"
          # Batch + loopback pinentry so the passphrase comes from env, not a tty.
          # --output /dev/null discards the ciphertext; we only care about exit code.
          if echo "publish workflow gpg smoke test" \
              | gpg --batch --pinentry-mode loopback \
                    --passphrase "$MAVEN_GPG_PASSPHRASE" \
                    --armor --sign --output /dev/null; then
            echo "Signing test succeeded — GPG is ready for sign-artifacts."
          else
            echo "::error::GPG sign test failed. Most likely the MAVEN_GPG_PASSPHRASE secret"
            echo "does not match the imported key."
            exit 1
          fi
          echo "::endgroup::"

      - name: Configure git author for release commits
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Idempotent re-run detection. If a previous run of this workflow
      # partially succeeded and left state behind (tag on origin, release
      # commit on main, or the next-snapshot bump already landed), we
      # skip the step that's already done instead of failing hard.
      - name: Detect prior release state
        id: state
        run: |
          TAG="v${{ github.event.inputs.releaseversion }}"
          if git ls-remote --tags --exit-code origin "$TAG" >/dev/null 2>&1; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists on origin — treating the release+tag step as done."
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

          POM_VERSION=$(mvn --batch-mode -q help:evaluate -Dexpression=project.version -DforceStdout)
          echo "Current pom.xml version: $POM_VERSION"
          if [ "$POM_VERSION" = "${{ github.event.inputs.nextSnapshotVersion }}" ]; then
            echo "bump_done=true" >> "$GITHUB_OUTPUT"
            echo "pom.xml already at next snapshot — treating the bump step as done."
          else
            echo "bump_done=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Early exit — fully succeeded previously
        if: steps.state.outputs.tag_exists == 'true' && steps.state.outputs.bump_done == 'true'
        run: |
          echo "Nothing to do. Tag v${{ github.event.inputs.releaseversion }} is already on origin and pom.xml is already at ${{ github.event.inputs.nextSnapshotVersion }}."
          echo "This run is a no-op."

      - name: Set project version to release version
        if: steps.state.outputs.tag_exists != 'true'
        run: mvn --batch-mode versions:set "-DnewVersion=${{ github.event.inputs.releaseversion }}" -DgenerateBackupPoms=false

      - name: Publish package
        if: steps.state.outputs.tag_exists != 'true' && github.event.inputs.skipDeploy != 'true'
        run: mvn --batch-mode clean deploy -P central-deploy -DskipTests=true
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

      # From here on the artifact is on Maven Central. Record it in git so the
      # tag's source tree matches what shipped, then bump main for the next
      # development iteration. These steps run only if the deploy succeeded.

      - name: Commit release pom.xml and push tag + commit atomically
        if: steps.state.outputs.tag_exists != 'true'
        run: |
          git add pom.xml
          git commit -m "Release ${{ github.event.inputs.releaseversion }}"
          git tag -a "v${{ github.event.inputs.releaseversion }}" -m "Release ${{ github.event.inputs.releaseversion }}"
          git push --atomic origin main "v${{ github.event.inputs.releaseversion }}"

      - name: Bump to next snapshot version and push
        if: steps.state.outputs.bump_done != 'true'
        run: |
          mvn --batch-mode versions:set "-DnewVersion=${{ github.event.inputs.nextSnapshotVersion }}" -DgenerateBackupPoms=false
          git add pom.xml
          git commit -m "Prepare for next development iteration: ${{ github.event.inputs.nextSnapshotVersion }}"
          git push origin main
